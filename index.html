<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow | Chat & Game</title>
    <style>
        /* עיצוב מודרני - Dark Mode */
        :root { 
            --primary: #6366f1; 
            --secondary: #ec4899;
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; min-height: 100vh; padding: 20px;
        }

        #login, #chat-container { 
            width: 100%; max-width: 400px; 
            background: var(--card); 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { color: var(--primary); text-align: center; margin-bottom: 10px; }
        p { text-align: center; opacity: 0.7; font-size: 0.9rem; }

        input { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; 
            background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box; 
            outline: none; transition: border 0.3s;
        }
        input:focus { border-color: var(--primary); }

        button { 
            width: 100%; padding: 12px; border-radius: 10px; border: none; 
            background: var(--primary); color: white; font-weight: bold; 
            cursor: pointer; transition: transform 0.2s, background 0.3s; 
        }
        button:hover { background: #4f46e5; transform: translateY(-2px); }

        /* אזור הצ'אט */
        #messages { 
            height: 200px; overflow-y: auto; background: #0f172a; 
            border-radius: 12px; padding: 10px; margin: 15px 0; 
            display: flex; flex-direction: column; gap: 8px; 
        }
        .msg { padding: 8px 12px; border-radius: 12px; background: #334155; width: fit-content; max-width: 85%; font-size: 0.95rem; }
        .msg.me { align-self: flex-end; background: var(--primary); }

        /* לוח המשחק */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .cell { 
            aspect-ratio: 1; background: #334155; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2.2rem; font-weight: bold; cursor: pointer; 
            transition: background 0.3s; 
        }
        .cell:hover { background: #475569; }
        
        #turn-display { text-align: center; color: var(--primary); font-weight: bold; margin-top: 15px; }
        .hidden { display: none; }
        #status { font-size: 0.9rem; margin-bottom: 10px; color: var(--primary); }
    </style>
</head>
<body>

    <div id="login">
        <h1>Flow.</h1>
        <p>מצא שותף לצ'אט ומשחק איקס-עיגול</p>
        <input type="text" id="username" placeholder="הכנס שם משתמש...">
        <button onclick="startSearch()">חפש שותף</button>
    </div>

    <div id="chat-container" class="hidden">
        <div id="status">● מחובר אל: <span id="partner-name"></span></div>
        <div id="messages"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="msg-input" placeholder="כתוב משהו..." style="margin:0;">
            <button onclick="sendMessage()" style="width:80px;">שלח</button>
        </div>

        <div class="grid">
            <div class="cell" onclick="handleMove(0)"></div>
            <div class="cell" onclick="handleMove(1)"></div>
            <div class="cell" onclick="handleMove(2)"></div>
            <div class="cell" onclick="handleMove(3)"></div>
            <div class="cell" onclick="handleMove(4)"></div>
            <div class="cell" onclick="handleMove(5)"></div>
            <div class="cell" onclick="handleMove(6)"></div>
            <div class="cell" onclick="handleMove(7)"></div>
            <div class="cell" onclick="handleMove(8)"></div>
        </div>
        <p id="turn-display">תור השחקן: X</p>
    </div>

    <script>
        let myName = "", currentRoom = null, myChar = "X", currentBoard = ".........";

        async function startSearch() {
            myName = document.getElementById('username').value;
            if(!myName) return alert("בחר שם משתמש");
            
            await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: myName}) });
            document.getElementById('login').innerHTML = "<h3 style='text-align:center;'>מחפש שותף לשיחה...</h3><p>זה עשוי לקחת כמה שניות</p>";

            const interval = setInterval(async () => {
                const res = await fetch(`/api/match/${myName}`);
                const data = await res.json();
                if(data.room_id) {
                    currentRoom = data.room_id;
                    document.getElementById('partner-name').innerText = data.partner;
                    document.getElementById('login').classList.add('hidden');
                    document.getElementById('chat-container').classList.remove('hidden');
                    // קביעת מי X ומי O לפי סדר השמות בחדר
                    if(currentRoom.startsWith(`room_${data.partner}`)) myChar = "O";
                    clearInterval(interval);
                    startPolling();
                }
            }, 2000);
        }

        function startPolling() {
            setInterval(async () => {
                const [mRes, gRes] = await Promise.all([
                    fetch(`/api/chat/${currentRoom}`),
                    fetch(`/api/game/${currentRoom}`)
                ]);
                const msgs = await mRes.json();
                const gData = await gRes.json();

                // עדכון הודעות
                const msgDiv = document.getElementById('messages');
                msgDiv.innerHTML = msgs.map(m => `
                    <div class="msg ${m.user === myName ? 'me' : ''}">${m.text}</div>
                `).join('');
                msgDiv.scrollTop = msgDiv.scrollHeight;

                // עדכון לוח משחק
                currentBoard = gData.board;
                document.getElementById('turn-display').innerText = "תור השחקן: " + gData.turn;
                
                const cells = document.querySelectorAll('.cell');
                currentBoard.split('').forEach((c, i) => {
                    cells[i].innerText = c === '.' ? '' : c;
                    cells[i].style.color = c === 'X' ? '#6366f1' : '#f43f5e';
                });
            }, 1000);
        }

        async function handleMove(i) {
            const gRes = await fetch(`/api/game/${currentRoom}`);
            const gData = await gRes.json();
            if(gData.turn !== myChar || currentBoard[i] !== '.') return;

            let arr = currentBoard.split('');
            arr[i] = myChar;
            await fetch(`/api/game/${currentRoom}/move`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ board: arr.join(''), char: myChar })
            });
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            await fetch(`/api/chat/${currentRoom}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: myName, text: input.value })
            });
            input.value = "";
        }
    </script>
</body>
</html>
