<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow | Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap');
        body { font-family: 'Heebo', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="login" class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl">
        <h1 class="text-6xl font-black text-center mb-2 text-indigo-500 tracking-tighter">Flow.</h1>
        <p class="text-center text-slate-400 mb-8 text-sm">צ'אט אנונימי מהיר ללא הרשמה</p>
        
        <div class="space-y-4">
            <input type="text" id="username" placeholder="איך לקרוא לך?" 
                class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-indigo-500 outline-none transition-all text-center text-lg">
            <button onclick="startSearch()" 
                class="w-full p-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold text-xl shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
                מצא שותף לשיחה
            </button>
        </div>
    </div>

    <div id="chat-container" class="hidden glass w-full max-w-2xl h-[80vh] flex flex-col p-6 rounded-3xl shadow-2xl">
        <div class="flex items-center justify-between mb-4 border-b border-slate-700 pb-4">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <span class="font-bold text-xl text-indigo-400" id="partner-name"></span>
            </div>
            <button onclick="location.reload()" class="text-xs bg-slate-800 hover:bg-red-900/40 px-3 py-1 rounded-full transition-all text-slate-400">נתק שיחה</button>
        </div>

        <div id="messages" class="flex-1 overflow-y-auto mb-4 flex flex-col gap-3 p-2"></div>

        <div class="flex gap-3 bg-slate-900/50 p-2 rounded-2xl border border-slate-700">
            <input type="text" id="msg-input" placeholder="כתוב הודעה שנונה..." 
                class="flex-1 p-3 bg-transparent outline-none text-lg"
                onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-indigo-600 p-3 px-6 rounded-xl font-bold hover:bg-indigo-500 transition-all">שלח</button>
        </div>
    </div>

    <script>
        let myName = "", currentRoom = null;

        async function startSearch() {
            myName = document.getElementById('username').value;
            if(!myName) return alert("הכנס שם!");
            
            document.getElementById('login').innerHTML = `
                <div class="flex flex-col items-center py-10">
                    <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <h3 class="text-2xl font-bold">מחפש שותף...</h3>
                    <p class="text-slate-400 mt-2">מיד תחובר למישהו אקראי</p>
                </div>`;

            await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: myName}) });

            const interval = setInterval(async () => {
                const res = await fetch(`/api/match/${myName}`);
                const data = await res.json();
                if(data.room_id) {
                    currentRoom = data.room_id;
                    document.getElementById('partner-name').innerText = data.partner;
                    document.getElementById('login').classList.add('hidden');
                    document.getElementById('chat-container').classList.remove('hidden');
                    clearInterval(interval);
                    startPolling();
                }
            }, 2000);
        }

        function startPolling() {
            setInterval(async () => {
                const res = await fetch(`/api/chat/${currentRoom}`);
                const msgs = await res.json();

                const msgDiv = document.getElementById('messages');
                msgDiv.innerHTML = msgs.map(m => `
                    <div class="flex ${m.user === myName ? 'justify-start' : 'justify-end'}">
                        <div class="max-w-[75%] px-4 py-2 rounded-2xl shadow-sm ${m.user === myName ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-700 text-slate-100 rounded-tl-none'}">
                            <p class="text-[10px] opacity-40 mb-1 font-bold">${m.user}</p>
                            <p class="text-md leading-relaxed">${m.text}</p>
                        </div>
                    </div>
                `).join('');
                msgDiv.scrollTop = msgDiv.scrollHeight;
            }, 1000);
        }

        async function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            const text = input.value;
            input.value = ""; // ניקוי מהיר לחוויה טובה יותר
            await fetch(`/api/chat/${currentRoom}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user: myName, text: text })
            });
        }
    </script>
</body>
</html>
